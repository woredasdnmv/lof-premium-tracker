name: Sync from Upstream

on:
  schedule:
    # 每天 UTC 时间 0:00 运行（北京时间 8:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

# 设置权限
permissions:
  contents: write  # 允许推送代码

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Add upstream remote
        run: git remote add upstream https://github.com/MistyBridge/lof-premium-tracker.git
      
      - name: Fetch upstream
        run: git fetch upstream danwangshi
      
      - name: Sync main branch
        run: |
          git checkout main
          git fetch upstream danwangshi
          git merge upstream/danwangshi --no-edit --strategy-option=theirs
          git push origin main
